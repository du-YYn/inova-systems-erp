name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# Princípio do menor privilégio — jobs só leem o repo.
# Se precisarmos publicar artefatos/releases/comments no futuro,
# override explicitamente nos jobs que precisarem.
permissions:
  contents: read

jobs:
  # ─── BACKEND ────────────────────────────────────────────────────────────────
  backend:
    name: Backend (Django)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: test_inova_erp
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    env:
      DJANGO_SETTINGS_MODULE: config.settings
      DJANGO_SECRET_KEY: ci-secret-key-not-for-production
      DEBUG: "false"
      DB_NAME: test_inova_erp
      DB_USER: test_user
      DB_PASSWORD: test_password
      DB_HOST: localhost
      DB_PORT: "5432"
      REDIS_URL: redis://localhost:6379/0
      EMAIL_BACKEND: django.core.mail.backends.locmem.EmailBackend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run migrations
        run: python manage.py migrate --no-input

      - name: Run tests
        run: pytest --tb=short --cov=. --cov-report=term-missing --cov-fail-under=70 -q

      - name: Check for missing migrations
        run: python manage.py makemigrations --check --dry-run

  # ─── BACKEND SECURITY ───────────────────────────────────────────────────────
  backend-security:
    name: Backend Security Scan
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install security tools
        run: pip install pip-audit bandit ruff

      - name: pip-audit — verifica CVEs nas dependências Python
        run: |
          # CVE-2026-4539 (pygments): sem versão de correção disponível ainda;
          # dependência transitiva de drf-spectacular/sentry-sdk. Ignorado até fix oficial.
          pip-audit -r requirements.txt --progress-spinner off \
            --ignore-vuln CVE-2026-4539

      - name: bandit — análise estática de segurança
        run: |
          bandit -r . \
            --exclude ./.git,./tests,./migrations,./conftest.py \
            --severity-level medium \
            --confidence-level medium \
            -f txt

      - name: ruff — linting e qualidade de código
        run: ruff check . --select E,W,F,S --ignore S101,S106 --output-format github

  # ─── FRONTEND ───────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: npm audit — verifica CVEs nas dependências npm
        # Falha apenas em vulnerabilidades críticas;
        # as 'high' restantes são dev-deps (eslint) ou mitigadas por config
        run: npm audit --audit-level=critical

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1

  # ─── SECRET SCANNING ────────────────────────────────────────────────────────
  secret-scan:
    name: Secret Scan (git history)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # histórico completo para scanning de secrets

      - name: TruffleHog — varre histórico git por secrets
        # Pinned to v3.95.2 commit SHA — `@main` é mutable e ataca via supply
        # chain (commit malicioso vira CI poisoning). Atualizar com:
        # gh api repos/trufflesecurity/trufflehog/git/refs/tags/<tag>
        uses: trufflesecurity/trufflehog@17456f8c7d042d8c82c9a8ca9e937231f9f42e26  # v3.95.2
        with:
          path: ./
          base: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          head: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          extra_args: --only-verified

name: CD — Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment: production
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          timeout: 60s
          command_timeout: 30m
          script: |
            set -e
            cd /opt/inova-systems-erp

            PREV_COMMIT=$(git rev-parse HEAD)

            # Atualizar código
            git fetch origin main
            git reset --hard origin/main

            # Rebuild e deploy (migrations rodam automaticamente no entrypoint do backend)
            docker compose up -d --build --remove-orphans

            # Smoke test com retry
            echo "Executando smoke test..."
            SUCCESS=false
            for i in $(seq 1 12); do
              HTTP_STATUS=$(docker compose exec -T backend curl -sf -o /dev/null -w "%{http_code}" http://localhost:8000/api/v1/core/health/ || echo "000")
              if [ "$HTTP_STATUS" = "200" ]; then
                SUCCESS=true
                break
              fi
              echo "Tentativa $i — HTTP $HTTP_STATUS — aguardando..."
              sleep 5
            done

            if [ "$SUCCESS" != "true" ]; then
              echo "Smoke test falhou! Rollback para $PREV_COMMIT..."
              git reset --hard "$PREV_COMMIT"
              docker compose up -d --build --remove-orphans
              exit 1
            fi

            echo "Deploy concluído com sucesso: $(date)"

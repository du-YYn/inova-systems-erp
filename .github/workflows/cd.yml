name: CD — Build (GHCR) & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# build precisa publicar no GHCR (packages: write); deploy só lê o repo.
permissions:
  contents: read
  packages: write

# Mantém o serial de deploys (um push espera o anterior).
concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/du-yyn/inova-systems-erp

jobs:
  # ── 1) BUILD: builda as imagens no runner do GitHub e publica no GHCR ────────
  build:
    name: Build & Push (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        include:
          - name: backend
            context: ./backend
            build_args: ""
          - name: frontend
            context: ./frontend
            build_args: |
              NEXT_PUBLIC_API_URL=https://erp.inovasystemssolutions.com/api/v1
          - name: apresentacao-backend
            context: ./apresentacao/backend
            build_args: ""
          - name: apresentacao-frontend
            context: ./apresentacao/frontend
            build_args: |
              VITE_API_URL=https://apresentacao-api.inovasystemssolutions.com/api
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          build-args: ${{ matrix.build_args }}
          tags: |
            ${{ env.IMAGE_PREFIX }}-${{ matrix.name }}:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}-${{ matrix.name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 2) DEPLOY: servidor só faz pull + up (SEM build) ────────────────────────
  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Deploy via SSH (pull + up, com rollback por tag)
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        uses: appleboy/ssh-action@029f5b4aeeeb58fdfe1410a5d17f967dacf36262 # v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          timeout: 5m
          command_timeout: 20m
          request_pty: false
          envs: GHCR_TOKEN
          script: |
            set -e
            # Autentica no GHCR para o pull funcionar independentemente de qual
            # usuario SSH o deploy usa (o deploy antigo buildava local e nao
            # precisava; o novo puxa imagem do GHCR).
            echo "$GHCR_TOKEN" | docker login ghcr.io -u du-yyn --password-stdin
            cd /opt/inova-systems-erp

            # Atualiza apenas arquivos versionados (docker-compose.yml, etc.).
            # NÃO builda nada no servidor — só precisamos do compose novo.
            # FETCH_HEAD = exatamente o que acabou de ser baixado (mais robusto
            # que origin/main, que pode nao atualizar em alguns ambientes).
            git fetch origin main
            git reset --hard FETCH_HEAD

            NEW_TAG="${{ github.sha }}"
            PREV_TAG=$(grep -E '^ERP_IMAGE_TAG=' .env | cut -d= -f2-)
            echo "Deploy: $(date) — nova tag=${NEW_TAG:0:12} anterior=${PREV_TAG:0:12}"

            # Grava a tag nova no .env (o compose lê ERP_IMAGE_TAG daqui).
            if grep -q '^ERP_IMAGE_TAG=' .env; then
              sed -i "s/^ERP_IMAGE_TAG=.*/ERP_IMAGE_TAG=${NEW_TAG}/" .env
            else
              echo "ERP_IMAGE_TAG=${NEW_TAG}" >> .env
            fi

            # Puxa as imagens prontas do GHCR (servidor precisa de `docker login ghcr.io`).
            docker compose pull backend frontend apresentacao_backend apresentacao_frontend

            # Sobe (migrations rodam no entrypoint do backend). Recriação é rápida: sem build.
            docker compose up -d --remove-orphans

            # ── Smoke test backend (até 120s) ──────────────────────────────
            SUCCESS=false
            for i in $(seq 1 24); do
              HTTP_STATUS=$(docker compose exec -T backend curl -sf -o /dev/null -w "%{http_code}" http://localhost:8000/api/v1/core/health/ 2>/dev/null || echo "000")
              if [ "$HTTP_STATUS" = "200" ]; then SUCCESS=true; break; fi
              echo "Tentativa $i/24 — HTTP $HTTP_STATUS — aguardando..."
              sleep 5
            done

            # Confere que o frontend está rodando (imagem pronta, sem crash loop).
            FE_RUNNING=$(docker compose ps --status running -q frontend 2>/dev/null | wc -l)
            if [ "$SUCCESS" = "true" ] && [ "$FE_RUNNING" != "1" ]; then
              echo "⚠ Frontend não está running."
              SUCCESS=false
            fi

            if [ "$SUCCESS" != "true" ]; then
              echo "=== SMOKE FALHOU — diagnóstico ==="
              docker compose ps --all || true
              docker compose logs backend --tail 120 || true
              docker compose logs frontend --tail 60 || true

              if [ -n "$PREV_TAG" ] && [ "$PREV_TAG" != "$NEW_TAG" ]; then
                echo "Rollback para ${PREV_TAG:0:12} (troca de tag, SEM build — segundos)..."
                sed -i "s/^ERP_IMAGE_TAG=.*/ERP_IMAGE_TAG=${PREV_TAG}/" .env
                docker compose up -d --remove-orphans || true
              else
                echo "Sem tag anterior para rollback — mantendo estado atual."
              fi
              exit 1
            fi

            echo "Deploy OK — tag ${NEW_TAG:0:12} ($(date))"

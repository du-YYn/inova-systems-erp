name: 🚨 Emergency Unlock User

# WORKFLOW TEMPORARIO — emergencia de perda de acesso.
# Permite resetar senha + zerar lockout via SSH (usa mesma credencial do CD).
# DEVE SER REMOVIDO do repo apos uso (audit trail fica no GitHub Actions).

on:
  workflow_dispatch:
    inputs:
      identifier:
        description: 'Email OU username do usuario (ex: john.lauriuti@inovasystemssolutions.com)'
        required: true
        type: string

permissions:
  contents: read

jobs:
  unlock:
    name: Reset password and unlock
    runs-on: ubuntu-latest
    environment: staging
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}

    steps:
      - uses: actions/checkout@v4

      - name: Gerar senha temporaria forte
        id: gen
        run: |
          # Senha forte aleatoria que atende ComplexityValidator (12+ chars,
          # upper + digit + symbol). 8 bytes hex = 16 chars random; total ~25.
          PWD="Temp$(openssl rand -hex 4)#Acesso2026!"
          echo "password=$PWD" >> "$GITHUB_OUTPUT"
          echo "Senha temporaria gerada (visivel na etapa final)."

      - name: Reset password via SSH
        uses: appleboy/ssh-action@029f5b4aeeeb58fdfe1410a5d17f967dacf36262
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          timeout: 5m
          command_timeout: 5m
          # NAO usar script_stop: true — quebra heredocs/multilinhas no shell
          # (injeta DRONE_SSH_PREV_COMMAND_EXIT_CODE entre cada linha).
          # Usamos `set -e` no script pra mesmo efeito.
          script: |
            set -e
            cd /opt/inova-systems-erp

            # Valores inline via templating do GitHub Actions (substituidos ANTES
            # do SSH). Evita problemas de propagacao de env vars do action para
            # SSH para Docker (em uma execucao anterior, USER_IDENTIFIER chegou
            # vazio porque env: no step nao foi propagado pelo action container).
            IDENT="${{ inputs.identifier }}"
            PWD='${{ steps.gen.outputs.password }}'

            echo "Reset solicitado para identificador: $IDENT"
            echo "Executando reset via container backend..."

            # Codigo Python passado como argumento ao manage.py shell -c (uma linha,
            # sem heredoc). Valores chegam via env vars do docker compose exec.
            # Single line evita quebra por wrappers de SSH action.
            docker compose exec -T \
              -e "USER_IDENT=$IDENT" \
              -e "USER_PWD=$PWD" \
              backend python manage.py shell -c "import os, sys; from django.db.models import Q; from accounts.models import User; ident = os.environ['USER_IDENT'].strip(); pwd = os.environ['USER_PWD']; user = User.objects.filter(Q(username=ident) | Q(email=ident)).first(); print(f'ERROR: usuario nao encontrado para {ident}') if user is None else None; sys.exit(1) if user is None else None; user.set_password(pwd); user.failed_attempts = 0; user.locked_until = None; user.temp_2fa_attempts = 0; user.save(); print(f'SUCCESS|username={user.username}|email={user.email}|role={user.role}')"

            echo ""
            echo "Reset concluido com sucesso."

      - name: Instrucoes de recuperacao
        if: success()
        run: |
          cat << 'EOF'

          ═══════════════════════════════════════════════════════════════
                            ACESSO RECUPERADO COM SUCESSO
          ═══════════════════════════════════════════════════════════════

          IDENTIFICADOR: ${{ inputs.identifier }}

          SENHA TEMPORARIA: ${{ steps.gen.outputs.password }}

          ═══════════════════════════════════════════════════════════════

          PROXIMOS PASSOS OBRIGATORIOS:

            1) Acesse: https://erp.inovasystemssolutions.com/login
            2) Loga com a senha temporaria acima
            3) Vai em /perfil/ e MUDA a senha IMEDIATAMENTE pra uma sua
            4) Avisa o time pra:
               - DELETAR este workflow (.github/workflows/emergency-unlock.yml)
               - Corrigir o servico de email (Resend) que esta quebrado
               - Revogar qualquer credencial exposta em chats

          ═══════════════════════════════════════════════════════════════
          EOF

      - name: Falha do reset
        if: failure()
        run: |
          echo "::error::Reset falhou. Possiveis causas:"
          echo "  - Identificador (email/username) nao existe no sistema"
          echo "  - Servidor inacessivel via SSH"
          echo "  - Container 'backend' nao esta rodando"
          echo "  Verifique o log do step 'Reset password via SSH'."

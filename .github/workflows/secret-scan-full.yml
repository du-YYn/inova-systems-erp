name: Secret Scan (histórico completo)

# Por que um workflow separado do CI?
# O secret-scan do ci.yml varre apenas o DELTA do PR (range base..head).
# Foi exatamente por isso que a chave TOTP passou: ela já estava no histórico
# ANTES do range varrido por qualquer PR, então nunca entrou no diff escaneado.
# Este workflow varre o REPOSITÓRIO INTEIRO (todos os commits do histórico),
# garantindo que qualquer secret já commitado seja detectado mesmo que tenha
# entrado fora de um PR aberto. Roda no merge para main/develop, diariamente
# (agendado) e sob demanda (workflow_dispatch). Fica separado do CI para não
# arrastar a suíte de testes/build no agendamento e por ser mais custoso.

on:
  push:
    branches: [main, develop]
  schedule:
    # Diariamente às 06:00 UTC — pega secrets já commitados fora de PRs.
    - cron: "0 6 * * *"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  secret-scan-full:
    name: Secret Scan (histórico completo)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # histórico completo (todos os commits)

      - name: TruffleHog — varre o histórico git inteiro por secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          # Sem base/head → escaneia TODO o histórico do repositório.
          extra_args: --only-verified

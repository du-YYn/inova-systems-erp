# Inova Systems ERP — docker-compose.yml v2
services:
  postgres:
    image: postgres:15
    container_name: inova_postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME:-inova_erp}
      POSTGRES_USER: ${DB_USER:-inova_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # SEGURANÇA: portas do banco não expostas externamente em produção.
    # Para acesso local em desenvolvimento, descomente a linha abaixo:
    # ports:
    #   - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-inova_user} -d ${DB_NAME:-inova_erp}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: inova_redis
    restart: unless-stopped
    # Autenticação Redis via REDIS_PASSWORD (obrigatório em produção)
    command: >
      sh -c "if [ -n \"$$REDIS_PASSWORD\" ]; then
               redis-server --requirepass $$REDIS_PASSWORD;
             else
               redis-server;
             fi"
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    # SEGURANÇA: porta Redis não exposta externamente em produção.
    # ports:
    #   - "127.0.0.1:6379:6379"
    healthcheck:
      test: >
        sh -c "if [ -n \"$$REDIS_PASSWORD\" ]; then
                 redis-cli -a $$REDIS_PASSWORD ping;
               else
                 redis-cli ping;
               fi"
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: inova_backend
    restart: unless-stopped
    env_file:
      - .env
    # PRODUÇÃO: portas não expostas diretamente — acesso via Nginx
    # DESENVOLVIMENTO: descomente para acesso direto
    # ports:
    #   - "127.0.0.1:8000:8000"
    environment:
      - DB_HOST=postgres
      - DB_NAME=${DB_NAME:-inova_erp}
      - DB_USER=${DB_USER:-inova_user}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_PORT=5432
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DEBUG=${DEBUG:-false}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      - SECURE_SSL_REDIRECT=${SECURE_SSL_REDIRECT:-false}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      # DESENVOLVIMENTO: monte o código local para hot-reload
      # PRODUÇÃO: remova este volume (a imagem já contém o código)
      - ./backend:/app
      # Volume compartilhado com Nginx para servir arquivos estáticos
      - static_files:/app/staticfiles
      - media_files:/app/media
    networks:
      - default
      - easypanel
    command: >
      sh -c "
        python manage.py migrate --no-input &&
        python manage.py collectstatic --no-input &&
        gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4 --timeout 60
      "
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/v1/core/health/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: inova_celery_worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DB_HOST=postgres
      - DB_NAME=${DB_NAME:-inova_erp}
      - DB_USER=${DB_USER:-inova_user}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_PORT=5432
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DEBUG=${DEBUG:-false}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: celery -A config worker --loglevel=info --concurrency=2

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: inova_celery_beat
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DB_HOST=postgres
      - DB_NAME=${DB_NAME:-inova_erp}
      - DB_USER=${DB_USER:-inova_user}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_PORT=5432
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DEBUG=${DEBUG:-false}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: celery -A config beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000/api/v1}
    container_name: inova_frontend
    restart: unless-stopped
    # PRODUÇÃO: porta não exposta diretamente — acesso via Nginx
    # DESENVOLVIMENTO: descomente para acesso direto
    # ports:
    #   - "127.0.0.1:3000:3000"
    networks:
      - default
      - easypanel
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000/api/v1}
    depends_on:
      backend:
        condition: service_healthy

  # nginx e certbot desativados — usando Traefik do EasyPanel como reverse proxy
  # O Traefik gerencia SSL (Let's Encrypt) e roteamento automaticamente

networks:
  default:
  easypanel:
    external: true

volumes:
  postgres_data:
  static_files:
  media_files:
  certbot_conf:
  certbot_www:

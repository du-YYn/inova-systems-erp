# Inova Systems ERP — docker-compose.yml (standalone)
# Tráfego HTTPS gerenciado pelo Traefik do Easypanel via rede compartilhada.
#
# CAMADA 2 (build no CI): os serviços de aplicação NÃO têm mais `build:`.
# As imagens são buildadas pelo GitHub Actions e publicadas no GHCR; o servidor
# apenas faz `docker compose pull && up -d`. A tag a ser usada vem da variável
# ERP_IMAGE_TAG (definida no .env; o deploy a atualiza para o SHA do commit).
# celery_worker e celery_beat REUSAM a imagem do backend (mesmo Dockerfile).
services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME:-inova_erp}
      POSTGRES_USER: ${DB_USER:-inova_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-inova_user} -d ${DB_NAME:-inova_erp}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      sh -c "if [ -n \"$$REDIS_PASSWORD\" ]; then
               redis-server --requirepass $$REDIS_PASSWORD;
             else
               redis-server;
             fi"
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    healthcheck:
      test: >
        sh -c "if [ -n \"$$REDIS_PASSWORD\" ]; then
                 redis-cli -a $$REDIS_PASSWORD ping;
               else
                 redis-cli ping;
               fi"
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/du-yyn/inova-systems-erp-backend:${ERP_IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DB_HOST=postgres
      - DB_NAME=${DB_NAME:-inova_erp}
      - DB_USER=${DB_USER:-inova_user}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_PORT=5432
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DEBUG=${DEBUG:-false}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      - SECURE_SSL_REDIRECT=${SECURE_SSL_REDIRECT:-false}
      - WEBSITE_API_KEY=${WEBSITE_API_KEY}
      - N8N_API_KEY=${N8N_API_KEY}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - PROPOSAL_PUBLIC_BASE_URL=${PROPOSAL_PUBLIC_BASE_URL:-}
      - EMAIL_BACKEND=${EMAIL_BACKEND:-django.core.mail.backends.smtp.EmailBackend}
      - EMAIL_HOST=${EMAIL_HOST:-smtp.resend.com}
      - EMAIL_PORT=${EMAIL_PORT:-587}
      - EMAIL_USE_TLS=${EMAIL_USE_TLS:-true}
      - EMAIL_HOST_USER=${EMAIL_HOST_USER:-resend}
      - EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD}
      - DEFAULT_FROM_EMAIL=${DEFAULT_FROM_EMAIL:-noreply@inovasystemssolutions.com}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - static_files:/app/staticfiles
      - media_files:/app/media
    networks:
      default:
      easypanel:
        aliases:
          - grupo_ry_inova-erp_backend
          # Alias hifenizado e ÚNICO usado pelo proxy server-side do frontend.
          # `grupo_ry_inova-erp_backend` tem UNDERSCORE, que a regex de Host do
          # Django (^[a-z0-9.-]+$) rejeita ANTES do ALLOWED_HOSTS → 400 → o proxy
          # caía no `backend` (ambíguo na rede easypanel compartilhada → round-
          # robin → 404). Hífen passa na regex e o nome é único → 1 IP (inova).
          # Requer `inova-erp-backend` no ALLOWED_HOSTS (ver .env / .env.example).
          - inova-erp-backend
    command: >
      sh -c "
        python manage.py migrate --no-input &&
        python manage.py collectstatic --no-input &&
        gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4 --timeout 60
      "
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/api/v1/core/health/ | grep -q '\"status\":\"ok\"'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  celery_worker:
    image: ghcr.io/du-yyn/inova-systems-erp-backend:${ERP_IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DB_HOST=postgres
      - DB_NAME=${DB_NAME:-inova_erp}
      - DB_USER=${DB_USER:-inova_user}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_PORT=5432
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DJANGO_SETTINGS_MODULE=config.settings
      - DEBUG=${DEBUG:-false}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1}
      - WEBSITE_API_KEY=${WEBSITE_API_KEY}
      - N8N_API_KEY=${N8N_API_KEY}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - PROPOSAL_PUBLIC_BASE_URL=${PROPOSAL_PUBLIC_BASE_URL:-}
      - EMAIL_BACKEND=${EMAIL_BACKEND:-django.core.mail.backends.smtp.EmailBackend}
      - EMAIL_HOST=${EMAIL_HOST:-smtp.resend.com}
      - EMAIL_PORT=${EMAIL_PORT:-587}
      - EMAIL_USE_TLS=${EMAIL_USE_TLS:-true}
      - EMAIL_HOST_USER=${EMAIL_HOST_USER:-resend}
      - EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD}
      - DEFAULT_FROM_EMAIL=${DEFAULT_FROM_EMAIL:-noreply@inovasystemssolutions.com}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    stop_grace_period: 60s
    command: celery -A config worker --loglevel=info --concurrency=2

  celery_beat:
    image: ghcr.io/du-yyn/inova-systems-erp-backend:${ERP_IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DB_HOST=postgres
      - DB_NAME=${DB_NAME:-inova_erp}
      - DB_USER=${DB_USER:-inova_user}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_PORT=5432
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DJANGO_SETTINGS_MODULE=config.settings
      - DEBUG=${DEBUG:-false}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1}
      - WEBSITE_API_KEY=${WEBSITE_API_KEY}
      - N8N_API_KEY=${N8N_API_KEY}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - PROPOSAL_PUBLIC_BASE_URL=${PROPOSAL_PUBLIC_BASE_URL:-}
      - EMAIL_BACKEND=${EMAIL_BACKEND:-django.core.mail.backends.smtp.EmailBackend}
      - EMAIL_HOST=${EMAIL_HOST:-smtp.resend.com}
      - EMAIL_PORT=${EMAIL_PORT:-587}
      - EMAIL_USE_TLS=${EMAIL_USE_TLS:-true}
      - EMAIL_HOST_USER=${EMAIL_HOST_USER:-resend}
      - EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD}
      - DEFAULT_FROM_EMAIL=${DEFAULT_FROM_EMAIL:-noreply@inovasystemssolutions.com}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    stop_grace_period: 60s
    command: celery -A config beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler

  frontend:
    image: ghcr.io/du-yyn/inova-systems-erp-frontend:${ERP_IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000/api/v1}
      # Backend interno para as rotas server-side do Next (proxy-login,
      # /api/proposal/[token], /api/onboarding/[token]). O serviço frontend NÃO
      # tem env_file, então estas vars PRECISAM ser listadas aqui para chegarem
      # ao container — sem isso o proxy caía no nome curto `backend`, AMBÍGUO na
      # rede easypanel compartilhada. Default vazio: o código já prefere o alias
      # único do projeto; definir no .env força um destino explícito.
      - INTERNAL_BACKEND_URL=${INTERNAL_BACKEND_URL:-}
      - INTERNAL_API_URL=${INTERNAL_API_URL:-}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      default:
      easypanel:
        aliases:
          - grupo_ry_inova-erp_frontend

  # ─── Inova Apresentação (subdomínio apresentacao.*) ──────────────────────────
  apresentacao_postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${APRESENTACAO_DB_NAME:-inova_apresentacao}
      POSTGRES_USER: ${APRESENTACAO_DB_USER:-inova_apresentacao}
      POSTGRES_PASSWORD: ${APRESENTACAO_DB_PASSWORD}
    volumes:
      - apresentacao_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${APRESENTACAO_DB_USER:-inova_apresentacao} -d ${APRESENTACAO_DB_NAME:-inova_apresentacao}"]
      interval: 10s
      timeout: 5s
      retries: 5

  apresentacao_backend:
    image: ghcr.io/du-yyn/inova-systems-erp-apresentacao-backend:${ERP_IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${APRESENTACAO_DB_NAME:-inova_apresentacao}
      - POSTGRES_USER=${APRESENTACAO_DB_USER:-inova_apresentacao}
      - POSTGRES_PASSWORD=${APRESENTACAO_DB_PASSWORD}
      - POSTGRES_HOST=apresentacao_postgres
      - POSTGRES_PORT=5432
      - DJANGO_SECRET_KEY=${APRESENTACAO_DJANGO_SECRET_KEY}
      - DJANGO_DEBUG=${APRESENTACAO_DJANGO_DEBUG:-False}
      - DJANGO_ALLOWED_HOSTS=${APRESENTACAO_ALLOWED_HOSTS:-apresentacao-api.inovasystemssolutions.com}
      - DJANGO_CORS_ORIGINS=${APRESENTACAO_CORS_ORIGINS:-https://apresentacao.inovasystemssolutions.com}
      - DJANGO_SECURE_SSL_REDIRECT=${APRESENTACAO_SECURE_SSL_REDIRECT:-False}
      - DJANGO_LOG_LEVEL=${APRESENTACAO_LOG_LEVEL:-INFO}
      - JWT_ACCESS_MINUTES=${APRESENTACAO_JWT_ACCESS_MINUTES:-15}
      - JWT_REFRESH_DAYS=${APRESENTACAO_JWT_REFRESH_DAYS:-7}
      - PRESENTATION_SHARED_SECRET=${PRESENTATION_SHARED_SECRET}
    depends_on:
      apresentacao_postgres:
        condition: service_healthy
    volumes:
      - apresentacao_media:/app/media
    networks:
      default:
      easypanel:
        aliases:
          - grupo_ry_inova-erp_apresentacao_backend
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/admin/login/ -o /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  apresentacao_frontend:
    image: ghcr.io/du-yyn/inova-systems-erp-apresentacao-frontend:${ERP_IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      apresentacao_backend:
        condition: service_healthy
    networks:
      default:
      easypanel:
        aliases:
          - grupo_ry_inova-erp_apresentacao_frontend

  db-backup:
    image: postgres:15
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - PGHOST=postgres
      - PGUSER=${DB_USER:-inova_user}
      - PGPASSWORD=${DB_PASSWORD}
      - PGDATABASE=${DB_NAME:-inova_erp}
    volumes:
      - db_backups:/backups
    command: >
      sh -c "
        while true; do
          STAMP=$$(date +%Y-%m-%d_%H%M);
          echo \"[$$STAMP] Starting backup...\";
          pg_dump --format=custom -f /backups/erp_$$STAMP.dump;
          if [ $$? -eq 0 ]; then
            echo \"[$$STAMP] Backup OK: $$(du -h /backups/erp_$$STAMP.dump | cut -f1)\";
            find /backups -name 'erp_*.dump' -mtime +7 -delete;
            echo \"[$$STAMP] Old backups cleaned.\";
          else
            echo \"[$$STAMP] BACKUP FAILED!\";
          fi;
          sleep 86400;
        done
      "

networks:
  default:
  easypanel:
    external: true

volumes:
  postgres_data:
  static_files:
  media_files:
  db_backups:
  apresentacao_postgres_data:
  apresentacao_media:

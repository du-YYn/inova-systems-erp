# Inova Systems ERP — docker-compose.yml (standalone)
# Tráfego HTTPS gerenciado pelo Traefik do Easypanel via rede compartilhada
services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME:-inova_erp}
      POSTGRES_USER: ${DB_USER:-inova_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-inova_user} -d ${DB_NAME:-inova_erp}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      sh -c "if [ -n \"$$REDIS_PASSWORD\" ]; then
               redis-server --requirepass $$REDIS_PASSWORD;
             else
               redis-server;
             fi"
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    healthcheck:
      test: >
        sh -c "if [ -n \"$$REDIS_PASSWORD\" ]; then
                 redis-cli -a $$REDIS_PASSWORD ping;
               else
                 redis-cli ping;
               fi"
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DB_HOST=postgres
      - DB_NAME=${DB_NAME:-inova_erp}
      - DB_USER=${DB_USER:-inova_user}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_PORT=5432
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DEBUG=${DEBUG:-false}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      - SECURE_SSL_REDIRECT=${SECURE_SSL_REDIRECT:-false}
      - WEBSITE_API_KEY=${WEBSITE_API_KEY}
      - N8N_API_KEY=${N8N_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - static_files:/app/staticfiles
      - media_files:/app/media
    networks:
      default:
      easypanel:
        aliases:
          - grupo_ry_inova-erp_backend
    command: >
      sh -c "
        python manage.py migrate --no-input &&
        python manage.py collectstatic --no-input &&
        gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4 --timeout 60
      "
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/v1/core/health/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DB_HOST=postgres
      - DB_NAME=${DB_NAME:-inova_erp}
      - DB_USER=${DB_USER:-inova_user}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_PORT=5432
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DJANGO_SETTINGS_MODULE=config.settings
      - DEBUG=${DEBUG:-false}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1}
      - WEBSITE_API_KEY=${WEBSITE_API_KEY}
      - N8N_API_KEY=${N8N_API_KEY}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - EMAIL_BACKEND=${EMAIL_BACKEND:-django.core.mail.backends.smtp.EmailBackend}
      - EMAIL_HOST=${EMAIL_HOST:-smtp.resend.com}
      - EMAIL_PORT=${EMAIL_PORT:-587}
      - EMAIL_USE_TLS=${EMAIL_USE_TLS:-true}
      - EMAIL_HOST_USER=${EMAIL_HOST_USER:-resend}
      - EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD}
      - DEFAULT_FROM_EMAIL=${DEFAULT_FROM_EMAIL:-noreply@inovasystemssolutions.com}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    stop_grace_period: 60s
    command: celery -A config worker --loglevel=info --concurrency=2

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DB_HOST=postgres
      - DB_NAME=${DB_NAME:-inova_erp}
      - DB_USER=${DB_USER:-inova_user}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_PORT=5432
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DJANGO_SETTINGS_MODULE=config.settings
      - DEBUG=${DEBUG:-false}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1}
      - WEBSITE_API_KEY=${WEBSITE_API_KEY}
      - N8N_API_KEY=${N8N_API_KEY}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - EMAIL_BACKEND=${EMAIL_BACKEND:-django.core.mail.backends.smtp.EmailBackend}
      - EMAIL_HOST=${EMAIL_HOST:-smtp.resend.com}
      - EMAIL_PORT=${EMAIL_PORT:-587}
      - EMAIL_USE_TLS=${EMAIL_USE_TLS:-true}
      - EMAIL_HOST_USER=${EMAIL_HOST_USER:-resend}
      - EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD}
      - DEFAULT_FROM_EMAIL=${DEFAULT_FROM_EMAIL:-noreply@inovasystemssolutions.com}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    stop_grace_period: 30s
    command: celery -A config beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000/api/v1}
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000/api/v1}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      default:
      easypanel:
        aliases:
          - grupo_ry_inova-erp_frontend

  db-backup:
    image: postgres:15
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - PGHOST=postgres
      - PGUSER=${DB_USER:-inova_user}
      - PGPASSWORD=${DB_PASSWORD}
      - PGDATABASE=${DB_NAME:-inova_erp}
    volumes:
      - db_backups:/backups
    command: >
      sh -c "
        while true; do
          STAMP=$$(date +%Y-%m-%d_%H%M);
          echo \"[$$STAMP] Starting backup...\";
          pg_dump --format=custom -f /backups/erp_$$STAMP.dump;
          if [ $$? -eq 0 ]; then
            echo \"[$$STAMP] Backup OK: $$(du -h /backups/erp_$$STAMP.dump | cut -f1)\";
            find /backups -name 'erp_*.dump' -mtime +7 -delete;
            echo \"[$$STAMP] Old backups cleaned.\";
          else
            echo \"[$$STAMP] BACKUP FAILED!\";
          fi;
          sleep 86400;
        done
      "

networks:
  default:
  easypanel:
    external: true

volumes:
  postgres_data:
  static_files:
  media_files:
  db_backups:

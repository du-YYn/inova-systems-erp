version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: inova_postgres
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME:-inova_erp}
      POSTGRES_USER: ${DB_USER:-inova_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me_in_production}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-inova_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: inova_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: inova_backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=postgres
      - DB_NAME=${DB_NAME:-inova_erp}
      - DB_USER=${DB_USER:-inova_user}
      - DB_PASSWORD=${DB_PASSWORD:-change_me_in_production}
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379
      - SECRET_KEY=${DJANGO_SECRET_KEY:-change_me_in_production}
      - DEBUG=${DEBUG:-true}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: >
      sh -c "
        python manage.py makemigrations accounts sales finance projects &&
        python manage.py migrate &&
        python manage.py runserver 0.0.0.0:8000
      "

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: inova_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
    depends_on:
      - backend

volumes:
  postgres_data:

# Inova Systems ERP — docker-compose.yml (standalone)
# Tráfego HTTPS gerenciado pelo Traefik do Easypanel via rede compartilhada
services:
  postgres:
    # Pinar por digest evita supply-chain risk de tag mutável.
    # Para atualizar: `docker pull postgres:15 && docker inspect postgres:15 --format '{{index .RepoDigests 0}}'`
    image: postgres:15@sha256:29342cb52157b098821961d2c14eec3c019071f56a5d559e990cf07cf541ea9b
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME:-inova_erp}
      POSTGRES_USER: ${DB_USER:-inova_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-inova_user} -d ${DB_NAME:-inova_erp}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine@sha256:7aec734b2bb298a1d769fd8729f13b8514a41bf90fcdd1f38ec52267fbaa8ee6
    restart: unless-stopped
    command: >
      sh -c "if [ -n \"$$REDIS_PASSWORD\" ]; then
               redis-server --requirepass $$REDIS_PASSWORD;
             else
               redis-server;
             fi"
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    # Healthcheck lê a senha de REDISCLI_AUTH (env var) em vez de `-a $PASSWORD`
    # no command line — evita expor a senha em `ps` dentro do container.
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=\"$$REDIS_PASSWORD\" redis-cli ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DB_HOST=postgres
      - DB_NAME=${DB_NAME:-inova_erp}
      - DB_USER=${DB_USER:-inova_user}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_PORT=5432
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DEBUG=${DEBUG:-false}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      - SECURE_SSL_REDIRECT=${SECURE_SSL_REDIRECT:-false}
      - WEBSITE_API_KEY=${WEBSITE_API_KEY}
      - N8N_API_KEY=${N8N_API_KEY}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - EMAIL_BACKEND=${EMAIL_BACKEND:-django.core.mail.backends.smtp.EmailBackend}
      - EMAIL_HOST=${EMAIL_HOST:-smtp.resend.com}
      - EMAIL_PORT=${EMAIL_PORT:-587}
      - EMAIL_USE_TLS=${EMAIL_USE_TLS:-true}
      - EMAIL_HOST_USER=${EMAIL_HOST_USER:-resend}
      - EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD}
      - DEFAULT_FROM_EMAIL=${DEFAULT_FROM_EMAIL:-noreply@inovasystemssolutions.com}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - static_files:/app/staticfiles
      - media_files:/app/media
    networks:
      default:
      easypanel:
        aliases:
          - grupo_ry_inova-erp_backend
    command: >
      sh -c "
        python manage.py migrate --no-input &&
        python manage.py collectstatic --no-input &&
        gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4 --timeout 60
      "
    healthcheck:
      # Valida o corpo da resposta ({"status":"ok"}), não apenas HTTP 200.
      # Isso evita falso positivo quando DB/cache estão degraded mas o endpoint
      # ainda responde 200 com status=degraded.
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/api/v1/core/health/ | grep -q '\"status\":\"ok\"'"]
      interval: 30s
      timeout: 10s
      retries: 3
      # start_period aumentado de 40s → 90s para acomodar:
      # - migrations mais pesadas (ex: seed de catálogo, ALTER TABLE em tabelas grandes)
      # - collectstatic em deploy cold
      # - boot do gunicorn com 4 workers
      start_period: 90s

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DB_HOST=postgres
      - DB_NAME=${DB_NAME:-inova_erp}
      - DB_USER=${DB_USER:-inova_user}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_PORT=5432
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DJANGO_SETTINGS_MODULE=config.settings
      - DEBUG=${DEBUG:-false}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1}
      - WEBSITE_API_KEY=${WEBSITE_API_KEY}
      - N8N_API_KEY=${N8N_API_KEY}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - EMAIL_BACKEND=${EMAIL_BACKEND:-django.core.mail.backends.smtp.EmailBackend}
      - EMAIL_HOST=${EMAIL_HOST:-smtp.resend.com}
      - EMAIL_PORT=${EMAIL_PORT:-587}
      - EMAIL_USE_TLS=${EMAIL_USE_TLS:-true}
      - EMAIL_HOST_USER=${EMAIL_HOST_USER:-resend}
      - EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD}
      - DEFAULT_FROM_EMAIL=${DEFAULT_FROM_EMAIL:-noreply@inovasystemssolutions.com}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    stop_grace_period: 60s
    command: celery -A config worker --loglevel=info --concurrency=2

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DB_HOST=postgres
      - DB_NAME=${DB_NAME:-inova_erp}
      - DB_USER=${DB_USER:-inova_user}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_PORT=5432
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DJANGO_SETTINGS_MODULE=config.settings
      - DEBUG=${DEBUG:-false}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1}
      - WEBSITE_API_KEY=${WEBSITE_API_KEY}
      - N8N_API_KEY=${N8N_API_KEY}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - EMAIL_BACKEND=${EMAIL_BACKEND:-django.core.mail.backends.smtp.EmailBackend}
      - EMAIL_HOST=${EMAIL_HOST:-smtp.resend.com}
      - EMAIL_PORT=${EMAIL_PORT:-587}
      - EMAIL_USE_TLS=${EMAIL_USE_TLS:-true}
      - EMAIL_HOST_USER=${EMAIL_HOST_USER:-resend}
      - EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD}
      - DEFAULT_FROM_EMAIL=${DEFAULT_FROM_EMAIL:-noreply@inovasystemssolutions.com}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Aumentado de 30s → 60s. Se uma task agendada estiver rodando quando
    # o container recebe SIGTERM, ela tem tempo suficiente pra terminar ou
    # ser reagendada pelo Celery Beat.
    stop_grace_period: 60s
    command: celery -A config beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000/api/v1}
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000/api/v1}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      default:
      easypanel:
        aliases:
          - grupo_ry_inova-erp_frontend

  # ─── Inova Apresentação (subdomínio apresentacao.*) ──────────────────────────
  apresentacao_postgres:
    image: postgres:16-alpine@sha256:4e6e670bb069649261c9c18031f0aded7bb249a5b6664ddec29c013a89310d50
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${APRESENTACAO_DB_NAME:-inova_apresentacao}
      POSTGRES_USER: ${APRESENTACAO_DB_USER:-inova_apresentacao}
      POSTGRES_PASSWORD: ${APRESENTACAO_DB_PASSWORD}
    volumes:
      - apresentacao_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${APRESENTACAO_DB_USER:-inova_apresentacao} -d ${APRESENTACAO_DB_NAME:-inova_apresentacao}"]
      interval: 10s
      timeout: 5s
      retries: 5

  apresentacao_backend:
    build:
      context: ./apresentacao/backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${APRESENTACAO_DB_NAME:-inova_apresentacao}
      - POSTGRES_USER=${APRESENTACAO_DB_USER:-inova_apresentacao}
      - POSTGRES_PASSWORD=${APRESENTACAO_DB_PASSWORD}
      - POSTGRES_HOST=apresentacao_postgres
      - POSTGRES_PORT=5432
      - DJANGO_SECRET_KEY=${APRESENTACAO_DJANGO_SECRET_KEY}
      - DJANGO_DEBUG=${APRESENTACAO_DJANGO_DEBUG:-False}
      - DJANGO_ALLOWED_HOSTS=${APRESENTACAO_ALLOWED_HOSTS:-apresentacao-api.inovasystemssolutions.com}
      - DJANGO_CORS_ORIGINS=${APRESENTACAO_CORS_ORIGINS:-https://apresentacao.inovasystemssolutions.com}
      - DJANGO_SECURE_SSL_REDIRECT=${APRESENTACAO_SECURE_SSL_REDIRECT:-False}
      - DJANGO_LOG_LEVEL=${APRESENTACAO_LOG_LEVEL:-INFO}
      - JWT_ACCESS_MINUTES=${APRESENTACAO_JWT_ACCESS_MINUTES:-15}
      - JWT_REFRESH_DAYS=${APRESENTACAO_JWT_REFRESH_DAYS:-7}
      - PRESENTATION_SHARED_SECRET=${PRESENTATION_SHARED_SECRET}
    depends_on:
      apresentacao_postgres:
        condition: service_healthy
    volumes:
      - apresentacao_media:/app/media
    networks:
      default:
      easypanel:
        aliases:
          - grupo_ry_inova-erp_apresentacao_backend
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/admin/login/ -o /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  apresentacao_frontend:
    build:
      context: ./apresentacao/frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${APRESENTACAO_VITE_API_URL:-https://apresentacao-api.inovasystemssolutions.com/api}
    restart: unless-stopped
    depends_on:
      apresentacao_backend:
        condition: service_healthy
    networks:
      default:
      easypanel:
        aliases:
          - grupo_ry_inova-erp_apresentacao_frontend

  db-backup:
    image: postgres:15@sha256:29342cb52157b098821961d2c14eec3c019071f56a5d559e990cf07cf541ea9b
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - PGHOST=postgres
      - PGUSER=${DB_USER:-inova_user}
      - PGPASSWORD=${DB_PASSWORD}
      - PGDATABASE=${DB_NAME:-inova_erp}
    volumes:
      - db_backups:/backups
    command: >
      sh -c "
        while true; do
          STAMP=$$(date +%Y-%m-%d_%H%M);
          echo \"[$$STAMP] Starting backup...\";
          pg_dump --format=custom -f /backups/erp_$$STAMP.dump;
          if [ $$? -eq 0 ]; then
            echo \"[$$STAMP] Backup OK: $$(du -h /backups/erp_$$STAMP.dump | cut -f1)\";
            find /backups -name 'erp_*.dump' -mtime +7 -delete;
            echo \"[$$STAMP] Old backups cleaned.\";
          else
            echo \"[$$STAMP] BACKUP FAILED!\";
          fi;
          sleep 86400;
        done
      "

networks:
  default:
  easypanel:
    external: true

volumes:
  postgres_data:
  static_files:
  media_files:
  db_backups:
  apresentacao_postgres_data:
  apresentacao_media:

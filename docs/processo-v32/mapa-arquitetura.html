<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Inova · Escritório Rodando (Digital Twin)</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap');
:root{
  --bg:#08080E;--panel:#13131c;--panel2:#1a1a24;--line:rgba(212,175,55,.16);
  --line-soft:rgba(255,255,255,.07);--gold:#D4AF37;--gold-b:#F0D060;
  --gold-grad:linear-gradient(135deg,#C9A227,#F0D060 50%,#D4AF37);
  --ink:#ECECEF;--muted:#8A8A95;--ok:#56B97D;--warn:#E0A845;--err:#FF6B6B;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{font-family:'Outfit',system-ui,sans-serif;background:var(--bg);color:var(--ink);overflow:hidden;-webkit-font-smoothing:antialiased}
#bar{position:fixed;top:0;left:0;right:0;height:58px;z-index:40;display:flex;align-items:center;gap:13px;padding:0 18px;
  background:rgba(10,10,16,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
.brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:15px}
.brand .dot{width:10px;height:10px;border-radius:50%;background:var(--gold-grad);box-shadow:0 0 12px rgba(212,175,55,.6)}
.brand small{display:block;font-weight:400;font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-top:1px}
.spacer{flex:1}
button.btn{font-family:inherit;font-size:13px;font-weight:600;color:var(--ink);background:var(--panel);
  border:1px solid var(--line-soft);padding:8px 14px;border-radius:9px;cursor:pointer;transition:.15s;white-space:nowrap}
button.btn:hover{border-color:var(--gold);color:#fff}
button.btn.primary{background:var(--gold-grad);color:#100c02;border:none;font-weight:700}
button.btn.danger{border-color:rgba(255,107,107,.4);color:#ff9b9b}
select.sel,input.rng{font-family:inherit;font-size:12.5px;color:var(--ink);background:var(--panel);border:1px solid var(--line-soft);border-radius:8px;padding:7px 10px;outline:none}
.lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
#stage{position:fixed;top:58px;left:0;display:block;background:radial-gradient(900px 500px at 50% 30%,#0e0e16,#08080e)}
#side{position:fixed;top:58px;right:0;bottom:0;width:340px;background:rgba(12,12,18,.96);border-left:1px solid var(--line);display:flex;flex-direction:column;z-index:30}
.counts{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:14px;border-bottom:1px solid var(--line-soft)}
.count{background:var(--panel2);border:1px solid var(--line-soft);border-radius:10px;padding:9px 8px;text-align:center}
.count b{display:block;font-size:21px;font-weight:800;background:var(--gold-grad);-webkit-background-clip:text;background-clip:text;color:transparent}
.count.err b{background:none;-webkit-text-fill-color:var(--err);color:var(--err)}
.count span{font-size:9.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
.side-h{padding:11px 14px 6px;font-size:11px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted)}
#log{flex:1;overflow-y:auto;padding:0 14px 14px;display:flex;flex-direction:column;gap:6px}
.ev{font-size:12px;line-height:1.4;padding:7px 10px;border-radius:8px;background:var(--panel);border-left:2px solid var(--line-soft)}
.ev .tm{font-size:9.5px;color:var(--muted);font-variant-numeric:tabular-nums}
.ev.auto{border-left-color:var(--gold);background:rgba(212,175,55,.08)}
.ev.auto b{color:var(--gold-b)}
.ev.block{border-left-color:var(--err);background:rgba(255,107,107,.1)}
.ev.block b{color:#ff9b9b}
.ev.ok{border-left-color:var(--ok)}
.ev .who{font-weight:700}
#trava{margin:0 14px 12px;display:none;background:rgba(255,107,107,.12);border:1px solid rgba(255,107,107,.4);border-radius:10px;padding:11px 13px;font-size:12.5px;color:#ffb3b3;font-weight:600}
#trava.on{display:block}
.ov{position:fixed;inset:0;z-index:60;background:rgba(4,4,8,.66);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;padding:20px}
.ov.open{display:flex}
.modal{width:min(500px,94vw);max-height:88vh;overflow:auto;background:var(--panel);border:1px solid var(--line);border-radius:16px;box-shadow:0 24px 70px rgba(0,0,0,.6);animation:pop .18s ease}
@keyframes pop{from{transform:scale(.96);opacity:0}to{transform:scale(1);opacity:1}}
.modal h3{margin:0;padding:16px 18px;font-size:14.5px;font-weight:700;border-bottom:1px solid var(--line-soft);display:flex;gap:9px;align-items:center}
.modal .pad{padding:14px 18px;font-size:12.5px;line-height:1.5}
.modal .stg{border-left:2px solid var(--line-soft);padding:6px 0 6px 11px;margin:9px 0}
.modal .stg b{font-size:12.5px}
.modal .stg code{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:11px;color:var(--gold-b);display:block;margin:2px 0}
.modal .stg .auto{color:var(--gold-b);font-size:11.5px;margin-top:3px}
.modal-foot{padding:12px 18px;border-top:1px solid var(--line-soft);text-align:right;background:rgba(0,0,0,.18)}
.hint{position:fixed;left:14px;bottom:12px;z-index:35;font-size:11px;color:var(--muted);background:rgba(15,15,22,.8);border:1px solid var(--line-soft);border-radius:20px;padding:6px 14px}
.hint b{color:var(--gold)}
</style>
</head>
<body>
<div id="bar">
  <div class="brand"><span class="dot"></span><div>Inova<small>Escritório Rodando · Digital Twin</small></div></div>
  <div class="spacer"></div>
  <span class="lbl">Falha</span>
  <select class="sel" id="fault">
    <option value="none">Nenhuma (ok)</option>
    <option value="contrato">Contrato não assinado</option>
    <option value="entrada">Entrada não paga</option>
    <option value="doc">Documentação não aprovada</option>
    <option value="auditoria">Auditoria reprovada</option>
  </select>
  <span class="lbl">Veloc.</span>
  <input class="rng" id="speed" type="range" min="1" max="10" value="5" style="width:90px">
  <button class="btn primary" id="play">▶ Rodar</button>
  <button class="btn danger" id="reset">Resetar</button>
</div>

<canvas id="stage"></canvas>

<div id="side">
  <div class="counts">
    <div class="count"><b id="c_lead">0</b><span>No funil</span></div>
    <div class="count"><b id="c_prod">0</b><span>Em produção</span></div>
    <div class="count"><b id="c_rec">0</b><span>Recorrência</span></div>
    <div class="count"><b id="c_tick">0</b><span>Chamados</span></div>
    <div class="count"><b id="c_done">0</b><span>Entregues</span></div>
    <div class="count err"><b id="c_block">0</b><span>Travas</span></div>
  </div>
  <div id="trava"></div>
  <div class="side-h">Operação ao vivo</div>
  <div id="log"></div>
</div>

<div class="hint">Clique numa <b>sala</b> pra ver as etapas e entidades · ajuste a <b>velocidade</b> · injete uma <b>falha</b> pra ver travar</div>

<div class="ov" id="ov"><div class="modal">
  <h3 id="mTitle"></h3><div class="pad" id="mBody"></div>
  <div class="modal-foot"><button class="btn" onclick="document.getElementById('ov').classList.remove('open')">Fechar</button></div>
</div></div>

<script>
"use strict";
const $=id=>document.getElementById(id);
const W=1080,H=660,CORR_Y=335;

/* ----------- Salas (setores) com agente, mesa, etapas ----------- */
const ROOMS={
 recep:{name:'Recepção',x:30,y:64,w:150,h:206,color:'#7FB3FF',agent:'',spawn:true,stages:[]},
 comercial:{name:'Comercial',x:198,y:64,w:250,h:206,color:'#D4AF37',agent:'Bia',stages:[
   ['Lead recebido','Prospect.status=new'],['Qualificação','status=qualified'],
   ['Análise técnica','status=tech_analysis (define o tipo)','Recebe também Pedidos de Update do Suporte'],
   ['Reunião 2 · Proposta','status=proposal · Proposal'],['Projeto Fechado','status=won'],
   ['Coleta de dados','status=data_collection · ClientOnboarding','⚡ Dispara Jurídico + Financeiro EM PARALELO']]},
 juridico:{name:'Jurídico',x:466,y:64,w:250,h:206,color:'#B98AE6',agent:'Léo',stages:[
   ['Contrato · Preparação','LegalCase(contrato).status=preparacao'],
   ['Envio (Autentique)','status=envio_assinatura'],['Aguardando assinatura','status=aguardando'],
   ['Contrato assinado','status=assinado','⚡ Libera a cobrança no Financeiro'],
   ['Doc do projeto · assinatura','LegalCase(validacao_documento)','⚡ Libera a Etapa 7 (Dev)']]},
 financeiro:{name:'Financeiro',x:734,y:64,w:316,h:206,color:'#56B97D',agent:'Fran',stages:[
   ['Pré-cadastro','Invoice.status=pending (do plano da proposta)'],
   ['Cobrança ativa','só após contrato assinado'],
   ['Entrada paga','Invoice.status=paid','⚡ Libera a Produção (Dia 0)']]},
 diretoria:{name:'Diretoria',x:30,y:404,w:180,h:222,color:'#9AA1B0',agent:'Dir',stages:[
   ['Escalação recebida','DirectorEscalation'],['Decisão','absorver / cobrar / negociar']]},
 suporte:{name:'Suporte',x:228,y:404,w:236,h:222,color:'#E0A845',agent:'Sam',stages:[
   ['Chamado aberto','SupportTicket.status=aberto'],['Triagem','status=triagem','⚡ Mudança → Comercial'],
   ['Análise','conclusao','⚡ Inconclusivo → Diretoria'],['Correção','status=correcao'],
   ['Resolvido','status=resolvido'],['Fechado','fecha sozinho após 5 dias']]},
 producao:{name:'Produção',x:482,y:404,w:568,h:222,color:'#46B7C9',agent:'Téo',stages:[
   ['E3 · Preparação','etapa_3 (não conta no prazo)'],
   ['E4 · Onboarding (Dia 0)','etapa_4 · dia_zero','⚡ Motor de Cronograma gera o Game Plan'],
   ['E5 · Documentação','etapa_5 · ProjectDocument','⚡ Etapa 6 envia a doc ao Jurídico'],
   ['E6 · Validação doc','etapa_6'],['E7 · Desenvolvimento','etapa_7 (espera doc assinada)'],
   ['E8 · Auditoria','etapa_8 · ProjectAudit'],['E9 · Apresentação','etapa_9 · DeliveryApproval'],
   ['Homologação','ReUpdateCycle'],['Registro entrega','ProjectEnvironment'],
   ['E10 · Graduação/Implem.','⚡ RecurrenceContract + Suporte'],['Recorrência','recorrencia']]},
};
for(const k in ROOMS){const r=ROOMS[k];r.cx=r.x+r.w/2;r.cy=r.y+r.h/2;r.top=r.y<CORR_Y;r.id=k;}

/* automações (origem->destino entre salas) para o efeito visual */
const AUTOS={
 a1:['comercial','juridico'],a2:['comercial','financeiro'],a3:['juridico','financeiro'],
 a4:['financeiro','producao'],a5:['producao','juridico'],a6:['juridico','producao'],
 a7:['producao','suporte'],a8:['suporte','comercial'],a9:['suporte','diretoria'],
};

/* ----------- Canvas ----------- */
const cv=$('stage'),ctx=cv.getContext('2d');let scale=1,ox=0,oy=0,DPR=1,CW=0,CH=0;
function resize(){
  DPR=window.devicePixelRatio||1;
  CW=Math.max(200,window.innerWidth-340);CH=Math.max(200,window.innerHeight-58);
  cv.style.width=CW+'px';cv.style.height=CH+'px';
  cv.width=Math.round(CW*DPR);cv.height=Math.round(CH*DPR);
  scale=Math.min(CW/W,CH/H);ox=(CW-W*scale)/2;oy=(CH-H*scale)/2;
}
window.addEventListener('resize',resize);

/* ----------- Personagens / simulação ----------- */
const NAMES=['Padaria do João','Auto Center','Clínica Bem','Studio Pilar','MotoPeças','Café Aurora',
 'Lima Odonto','TechVend','Pet Lar','Mercado Vila','Advoc. Reis','Construfácil'];
const PAL=['#F0D060','#56B97D','#46B7C9','#B98AE6','#E0A845','#E08A3C','#7FB3FF','#F08A8A','#9AE6B4'];
let walkers=[],clients={},effects=[],running=false,t=0,idc=0,nameIdx=0,spawnT=0;
let counts={done:0,block:0,tickets:0,rec:0};

function log(msg,cls='',who=''){
  const el=document.createElement('div');el.className='ev '+cls;
  el.innerHTML=`<span class="tm">${fmtT()}</span> ${who?`<span class="who">${who}:</span> `:''}${msg}`;
  $('log').prepend(el);while($('log').children.length>120)$('log').lastChild.remove();
}
function fmtT(){const s=Math.floor(t);return Math.floor(s/60)+':'+String(s%60).padStart(2,'0');}

function buildPath(sx,sy,room){
  const door={x:room.cx,y:room.top?room.y+room.h:room.y},desk={x:room.cx,y:room.cy};
  return [{x:sx,y:CORR_Y},{x:room.cx,y:CORR_Y},door,desk];
}
function makeWalker(cl,sector,stage,from){
  const w={id:'w'+(++idc),cl,sector,stage,state:'walk',timer:0,wait:0,
    x:from?from.x:ROOMS.recep.cx,y:from?from.y:ROOMS.recep.cy,path:[],pi:0,bob:Math.random()*6};
  w.path=buildPath(w.x,w.y,ROOMS[sector]);walkers.push(w);return w;
}
function spawnClient(){
  let nm=NAMES[nameIdx%NAMES.length];if(nameIdx>=NAMES.length)nm+=' '+(Math.floor(nameIdx/NAMES.length)+1);
  nameIdx++;const id='c'+(++idc);
  const cl={id,name:nm,color:PAL[idc%PAL.length],tipo:Math.random()<.5?'fechado':'recorrente',flags:{}};
  clients[id]=cl;makeWalker(cl,'comercial',0,{x:ROOMS.recep.cx,y:ROOMS.recep.cy});
  log('entrou como lead','',nm);
}
const WORK=()=>0.8+Math.random()*0.5; // segundos por etapa

function deskOf(sec){return {x:ROOMS[sec].cx,y:ROOMS[sec].cy};}
function go(w,sec,st){
  if(sec!==w.sector){w.sector=sec;w.stage=st;w.path=buildPath(w.x,w.y,ROOMS[sec]);w.pi=0;w.state='walk';}
  else{w.stage=st;w.state='work';w.timer=WORK();}
}
function fireAuto(id,who){effects.push({type:'auto',a:AUTOS[id][0],b:AUTOS[id][1],ttl:1.1});}
function pulse(sec){effects.push({type:'pulse',sec,ttl:.8});}

function advance(w){
  const cl=w.cl,f=cl.flags,fault=$('fault').value,key=w.sector+':'+w.stage;
  const end=()=>{w.state='done';};
  const blk=(m)=>{w.state='block';counts.block++;log(m,'block',cl.name);
    $('trava').textContent='⛔ TRAVOU — '+cl.name+': '+m;$('trava').classList.add('on');};
  switch(key){
   case 'comercial:0':go(w,'comercial',1);break;
   case 'comercial:1':go(w,'comercial',2);break;
   case 'comercial:2':go(w,'comercial',3);break;
   case 'comercial:3':go(w,'comercial',4);break;
   case 'comercial:4':go(w,'comercial',5);break;
   case 'comercial:5':
     pulse('comercial');fireAuto('a1');fireAuto('a2');
     log('coleta preenchida → <b>Jurídico</b> + <b>Financeiro</b> em paralelo','auto',cl.name);
     go(w,'juridico',0);makeWalker(cl,'financeiro',0,deskOf('comercial'));break;
   case 'juridico:0':go(w,'juridico',1);break;
   case 'juridico:1':go(w,'juridico',2);break;
   case 'juridico:2':if(fault==='contrato'){blk('Contrato travado no Autentique (assinatura não veio)');return;}go(w,'juridico',3);break;
   case 'juridico:3':f.contrato_ok=true;pulse('juridico');fireAuto('a3');log('contrato assinado → libera cobrança','auto',cl.name);end();break;
   case 'juridico:4':if(fault==='doc'){blk('Documentação travada (cliente não aprovou)');return;}
     f.doc_ok=true;pulse('juridico');fireAuto('a6');log('documentação assinada → libera Etapa 7','auto',cl.name);end();break;
   case 'financeiro:0':go(w,'financeiro',1);break;
   case 'financeiro:1':if(!f.contrato_ok){if(fault==='contrato'){blk('Cobrança travada: contrato não assinado');return;}w.state='wait';w.timer=.4;return;}go(w,'financeiro',2);break;
   case 'financeiro:2':if(fault==='entrada'){blk('Entrada não paga (pagamento não confirmado)');return;}
     f.pagamento_ok=true;pulse('financeiro');fireAuto('a4');log('entrada paga → libera a Produção (Dia 0)','auto',cl.name);
     makeWalker(cl,'producao',0,deskOf('financeiro'));end();break;
   case 'producao:0':if(!f.pagamento_ok){w.state='wait';w.timer=.4;return;}go(w,'producao',1);break;
   case 'producao:1':f.dia0=true;pulse('producao');log('Dia 0 · <b>Motor de Cronograma</b> gerou o Game Plan','auto',cl.name);go(w,'producao',2);break;
   case 'producao:2':go(w,'producao',3);break;
   case 'producao:3':pulse('producao');fireAuto('a5');log('Etapa 6 → envia documentação ao Jurídico','auto',cl.name);
     makeWalker(cl,'juridico',4,deskOf('producao'));w.stage=3.5;w.state='wait';w.timer=.4;break;
   case 'producao:3.5':if(!f.doc_ok){w.state='wait';w.timer=.4;return;}go(w,'producao',4);break;
   case 'producao:4':if(!f.doc_ok){w.state='wait';w.timer=.4;return;}go(w,'producao',5);break;
   case 'producao:5':if(fault==='auditoria'){blk('Auditoria reprovada (não passou na conferência)');return;}go(w,'producao',6);break;
   case 'producao:6':go(w,'producao',7);break;
   case 'producao:7':go(w,'producao',8);break;
   case 'producao:8':go(w,'producao',9);break;
   case 'producao:9':f.recorrencia=true;pulse('producao');fireAuto('a7');
     log(`entregue (${cl.tipo}) → RecurrenceContract + Suporte`,'auto',cl.name);counts.done++;go(w,'producao',10);
     if(Math.random()<.7){counts.tickets++;makeWalker(cl,'suporte',0,deskOf('producao'));}break;
   case 'producao:10':counts.rec++;end();break;
   case 'suporte:0':go(w,'suporte',1);break;
   case 'suporte:1':{const r=Math.random();
     if(r<.25){pulse('suporte');fireAuto('a8');log('chamado é MUDANÇA → novo projeto no Comercial','auto',cl.name);
       makeWalker(cl,'comercial',2,deskOf('suporte'));counts.tickets=Math.max(0,counts.tickets-1);end();break;}
     if(r<.4){log('dúvida resolvida na hora','ok',cl.name);go(w,'suporte',4);break;}
     go(w,'suporte',2);break;}
   case 'suporte:2':{const r=Math.random();
     if(r<.2){pulse('suporte');fireAuto('a9');log('caso inconclusivo → escala pra Diretoria','auto',cl.name);
       makeWalker(cl,'diretoria',0,deskOf('suporte'));w.stage=2.5;w.state='wait';w.timer=.4;break;}
     go(w,'suporte',3);break;}
   case 'suporte:2.5':if(!f.dir_ok){w.state='wait';w.timer=.4;return;}go(w,'suporte',3);break;
   case 'suporte:3':go(w,'suporte',4);break;
   case 'suporte:4':go(w,'suporte',5);break;
   case 'suporte:5':log('chamado fechado','ok',cl.name);counts.tickets=Math.max(0,counts.tickets-1);end();break;
   case 'diretoria:0':go(w,'diretoria',1);break;
   case 'diretoria:1':f.dir_ok=true;pulse('diretoria');log('Diretoria decidiu → devolve ao fluxo','ok',cl.name);end();break;
   default:end();
  }
}

/* update por frame */
function update(dt){
  t+=dt;spawnT-=dt;
  if(spawnT<=0&&walkers.length<14){spawnClient();spawnT=2+Math.random()*1.6;}
  const WS=120; // px/s
  for(const w of walkers){
    if(w.state==='done'||w.state==='block')continue;
    w.bob+=dt*6;
    if(w.state==='walk'){
      const tgt=w.path[w.pi];const dx=tgt.x-w.x,dy=tgt.y-w.y,d=Math.hypot(dx,dy);
      const step=WS*dt;
      if(d<=step){w.x=tgt.x;w.y=tgt.y;w.pi++;if(w.pi>=w.path.length){w.state='work';w.timer=WORK();}}
      else{w.x+=dx/d*step;w.y+=dy/d*step;}
    } else { // work / wait
      w.timer-=dt;if(w.timer<=0)advance(w);
    }
  }
  walkers=walkers.filter(w=>w.state!=='done');
  for(const e of effects)e.ttl-=dt;effects=effects.filter(e=>e.ttl>0);
  updateHUD();
}
function updateHUD(){
  let lead=0,prod=0;const busy={};
  for(const w of walkers){
    if(['comercial','juridico','financeiro'].includes(w.sector))lead++;
    if(w.sector==='producao'&&Math.floor(w.stage)<10)prod++;
    if(w.state==='work'||w.state==='wait')busy[w.sector]=true;
  }
  $('c_lead').textContent=lead;$('c_prod').textContent=prod;$('c_rec').textContent=counts.rec;
  $('c_tick').textContent=counts.tickets;$('c_done').textContent=counts.done;$('c_block').textContent=counts.block;
  ROOMS._busy=busy;
}

/* ----------- Desenho ----------- */
function rr(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
function person(x,y,col,bob,working){
  const b=working?Math.sin(bob)*1.5:0;
  ctx.save();ctx.translate(x,y+b);
  ctx.fillStyle='rgba(0,0,0,.25)';ctx.beginPath();ctx.ellipse(0,9,7,3,0,0,7);ctx.fill();
  ctx.fillStyle=col;rr(-5,-2,10,11,4);ctx.fill();           // corpo
  ctx.fillStyle='#f3d9b0';ctx.beginPath();ctx.arc(0,-7,5,0,7);ctx.fill(); // cabeça
  ctx.restore();
}
function draw(){
  resizeIfNeeded();
  ctx.setTransform(DPR,0,0,DPR,0,0);
  ctx.clearRect(0,0,CW,CH);
  ctx.save();ctx.translate(ox,oy);ctx.scale(scale,scale);
  // corredor
  ctx.fillStyle='rgba(255,255,255,.03)';rr(20,CORR_Y-34,W-40,68,14);ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,.05)';ctx.setLineDash([8,10]);ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(30,CORR_Y);ctx.lineTo(W-30,CORR_Y);ctx.stroke();ctx.setLineDash([]);
  // automações ativas (linhas douradas entre salas)
  for(const e of effects){ if(e.type!=='auto')continue;
    const A=ROOMS[e.a],B=ROOMS[e.b],al=Math.min(1,e.ttl);
    ctx.strokeStyle=`rgba(240,208,96,${.85*al})`;ctx.lineWidth=3;ctx.setLineDash([6,5]);
    const ay=A.top?A.y+A.h:A.y,by=B.top?B.y+B.h:B.y;
    ctx.beginPath();ctx.moveTo(A.cx,ay);ctx.bezierCurveTo(A.cx,CORR_Y,B.cx,CORR_Y,B.cx,by);ctx.stroke();ctx.setLineDash([]);
  }
  // salas
  const busy=ROOMS._busy||{};
  for(const k in ROOMS){ if(k==='_busy')continue; const r2=ROOMS[k];
    const pulsing=effects.some(e=>e.type==='pulse'&&e.sec===k);
    ctx.fillStyle='rgba(255,255,255,.02)';rr(r2.x,r2.y,r2.w,r2.h,16);ctx.fill();
    ctx.fillStyle=hex(r2.color,pulsing?.20:.09);rr(r2.x,r2.y,r2.w,r2.h,16);ctx.fill();
    ctx.lineWidth=pulsing?3:1.4;ctx.strokeStyle=hex(r2.color,pulsing?.9:.4);rr(r2.x,r2.y,r2.w,r2.h,16);ctx.stroke();
    // nome
    ctx.fillStyle=r2.color;ctx.font='700 15px Outfit';ctx.textAlign='left';
    ctx.fillText(r2.name,r2.x+14,r2.y+24);
    if(r2.agent){ // agente + mesa
      ctx.fillStyle='rgba(255,255,255,.45)';ctx.font='600 11px Outfit';
      ctx.fillText(r2.agent+(busy[k]?' · trabalhando':' · ocioso'),r2.x+14,r2.y+40);
      const dx=r2.cx,dy=r2.y+34;
      ctx.fillStyle='rgba(0,0,0,.3)';rr(dx-22,dy+14,44,10,3);ctx.fill(); // mesa
      person(dx,dy,r2.color,t*6,!!busy[k]);
    } else { ctx.fillStyle='rgba(255,255,255,.3)';ctx.font='600 11px Outfit';ctx.fillText('entrada',r2.x+14,r2.y+40); }
  }
  // personagens andando
  for(const w of walkers){
    person(w.x,w.y,w.cl.color,w.bob,w.state==='work');
    if(w.state==='block'){ ctx.fillStyle='#FF6B6B';ctx.font='800 16px Outfit';ctx.textAlign='center';ctx.fillText('!',w.x,w.y-16); }
    ctx.fillStyle='rgba(255,255,255,.7)';ctx.font='600 9px Outfit';ctx.textAlign='center';
    ctx.fillText(w.cl.name.split(' ')[0],w.x,w.y+22);
  }
  ctx.restore();
}
function hex(c,a){const n=parseInt(c.slice(1),16);return `rgba(${n>>16&255},${n>>8&255},${n&255},${a})`;}
let lastWH='';function resizeIfNeeded(){const k=window.innerWidth+'x'+window.innerHeight;if(k!==lastWH){lastWH=k;resize();}}

/* ----------- Loop ----------- */
let last=0;
function frame(ts){
  if(!last)last=ts;let dt=(ts-last)/1000;last=ts;if(dt>0.1)dt=0.1;
  if(running)update(dt*($('speed').value/3));
  draw();requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

/* ----------- Controles ----------- */
$('play').onclick=()=>{running=!running;$('play').textContent=running?'⏸ Pausar':'▶ Rodar';};
$('reset').onclick=()=>{walkers=[];clients={};effects=[];t=0;idc=0;nameIdx=0;spawnT=0;
  counts={done:0,block:0,tickets:0,rec:0};$('log').innerHTML='';$('trava').classList.remove('on');updateHUD();};

/* clique numa sala → detalhe */
cv.addEventListener('click',e=>{
  const r=cv.getBoundingClientRect();const mx=(e.clientX-r.left-ox)/scale,my=(e.clientY-r.top-oy)/scale;
  for(const k in ROOMS){if(k==='_busy')continue;const s=ROOMS[k];
    if(mx>=s.x&&mx<=s.x+s.w&&my>=s.y&&my<=s.y+s.h&&s.stages.length){
      $('mTitle').innerHTML=`<span style="width:9px;height:9px;border-radius:50%;background:${s.color};display:inline-block"></span> ${s.name}${s.agent?' · '+s.agent:''}`;
      $('mBody').innerHTML=s.stages.map(st=>`<div class="stg"><b>${st[0]}</b><code>${st[1]}</code>${st[2]?`<div class="auto">${st[2]}</div>`:''}</div>`).join('');
      $('ov').classList.add('open');return;
    }
  }
});
$('ov').addEventListener('mousedown',e=>{if(e.target===$('ov'))$('ov').classList.remove('open');});

resize();updateHUD();
</script>

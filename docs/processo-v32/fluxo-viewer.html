<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Inova · Fluxo do Processo (estilo n8n)</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap');
:root{--bg:#08080E;--panel:#14141d;--gold:#D4AF37;--gold-grad:linear-gradient(135deg,#C9A227,#F0D060 50%,#D4AF37);
 --ink:#ECECEF;--muted:#8A8A95;--line-soft:rgba(255,255,255,.07)}
*{box-sizing:border-box}html,body{height:100%;margin:0}
body{font-family:'Outfit',system-ui,sans-serif;background:var(--bg);color:var(--ink);overflow:hidden;-webkit-font-smoothing:antialiased}
#bar{position:fixed;top:0;left:0;right:0;height:56px;z-index:40;display:flex;align-items:center;gap:13px;padding:0 18px;
 background:rgba(10,10,16,.9);backdrop-filter:blur(12px);border-bottom:1px solid rgba(212,175,55,.16)}
.brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:15px}
.brand .dot{width:10px;height:10px;border-radius:50%;background:var(--gold-grad);box-shadow:0 0 12px rgba(212,175,55,.6)}
.brand small{display:block;font-weight:400;font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-top:1px}
.spacer{flex:1}
button.btn{font-family:inherit;font-size:13px;font-weight:600;color:var(--ink);background:var(--panel);border:1px solid var(--line-soft);padding:8px 13px;border-radius:9px;cursor:pointer}
button.btn:hover{border-color:var(--gold);color:#fff}
.zoomlbl{min-width:44px;text-align:center;font-size:12px;color:var(--muted)}
#stage{position:fixed;inset:56px 0 0 0;overflow:hidden;cursor:grab;background:var(--bg)}
#stage.grab{cursor:grabbing}
#world{position:absolute;top:0;left:0;transform-origin:0 0;background-image:radial-gradient(rgba(212,175,55,.09) 1.1px,transparent 1.2px);background-size:30px 30px}
#lanes{position:absolute;left:0;top:0}
.lane{position:absolute;border-radius:16px;border:1px solid rgba(255,255,255,.05)}
.lane-lbl{position:absolute;left:16px;top:10px;font-size:22px;font-weight:800;letter-spacing:2px;text-transform:uppercase;opacity:.30}
svg#edges{position:absolute;left:0;top:0;overflow:visible;pointer-events:none}
.edge{fill:none;stroke:rgba(201,210,225,.55);stroke-width:2.2}
.edge.cross{stroke:rgba(240,208,96,.85);stroke-width:2.4;stroke-dasharray:6 5}
.elabel{fill:#F0D060;font:600 10px Outfit;opacity:.85}
#nodes{position:absolute;left:0;top:0}
.node{position:absolute;width:216px;height:76px;background:linear-gradient(180deg,#181820,#131319);
 border:1px solid rgba(255,255,255,.09);border-radius:13px;box-shadow:0 6px 18px rgba(0,0,0,.42);overflow:hidden;cursor:pointer;
 transition:transform .12s,border-color .12s,box-shadow .12s}
.node:hover{border-color:var(--gold);transform:translateY(-2px);box-shadow:0 12px 28px rgba(0,0,0,.55)}
.node .acc{position:absolute;left:0;top:0;bottom:0;width:3px}
.node .nhd{display:flex;align-items:flex-start;gap:8px;padding:11px 42px 0 15px}
.node .ndot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:3px}
.node .ttl{font-size:13px;font-weight:600;color:#fff;line-height:1.28;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.node .nent{padding:6px 12px 11px 15px;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:10px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.node .nkind{position:absolute;top:10px;right:12px;font-size:8px;font-weight:800;letter-spacing:.7px;text-transform:uppercase;opacity:.85}
.tracklbl{position:absolute;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase}
.legend{position:fixed;left:14px;bottom:14px;z-index:30;background:rgba(15,15,22,.86);border:1px solid var(--line-soft);border-radius:11px;padding:11px 13px;font-size:11.5px;color:var(--muted)}
.legend .row{display:flex;align-items:center;gap:7px;margin:3px 0}
.legend .sw{width:11px;height:11px;border-radius:3px}
.legend .ln{width:18px;height:0;border-top:2px solid}
.ov{position:fixed;inset:0;z-index:60;background:rgba(4,4,8,.6);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;padding:20px}
.ov.open{display:flex}
.modal{width:min(460px,94vw);background:var(--panel);border:1px solid rgba(212,175,55,.2);border-radius:16px;box-shadow:0 24px 70px rgba(0,0,0,.6)}
.modal h3{margin:0;padding:15px 18px;font-size:14px;font-weight:700;border-bottom:1px solid var(--line-soft);display:flex;gap:9px;align-items:center}
.modal .pad{padding:15px 18px;font-size:13px;line-height:1.6}
.modal .k{font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-top:11px}
.modal code{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12px;color:#F0D060;background:rgba(212,175,55,.08);padding:2px 6px;border-radius:5px}
.modal .auto{margin-top:9px;background:rgba(212,175,55,.07);border:1px solid rgba(212,175,55,.2);border-radius:9px;padding:9px 11px;font-size:12px;color:#F0D060}
.modal-foot{padding:12px 18px;border-top:1px solid var(--line-soft);text-align:right}
.hint{position:fixed;left:50%;transform:translateX(-50%);bottom:14px;z-index:30;background:rgba(15,15,22,.82);border:1px solid var(--line-soft);border-radius:30px;padding:7px 16px;font-size:11.5px;color:var(--muted)}
.hint b{color:var(--gold)}
</style>
</head>
<body>
<div id="bar">
  <div class="brand"><span class="dot"></span><div>Inova<small>Fluxo do Processo · estilo n8n</small></div></div>
  <div class="spacer"></div>
  <button class="btn" id="zo">−</button><span class="zoomlbl" id="zl">70%</span><button class="btn" id="zi">+</button>
  <button class="btn" id="fit">Ajustar</button>
</div>
<div id="stage"><div id="world"><div id="lanes"></div><svg id="edges"></svg><div id="nodes"></div></div></div>
<div class="legend">
  <div class="row"><span class="sw" style="background:#56B97D"></span> Gatilho de entrada</div>
  <div class="row"><span class="sw" style="background:#A7ADBF"></span> Ação</div>
  <div class="row"><span class="sw" style="background:#E0A845"></span> Decisão</div>
  <div class="row"><span class="sw" style="background:#D4AF37"></span> Automação</div>
  <div class="row"><span class="ln" style="border-color:rgba(201,210,225,.6)"></span> Fluxo interno</div>
  <div class="row"><span class="ln" style="border-color:#F0D060;border-top-style:dashed"></span> Automação entre setores</div>
</div>
<div class="hint">Arraste o <b>fundo</b> pra mover · <b>scroll</b> pra zoom · clique numa <b>caixa</b> pra detalhe</div>
<div class="ov" id="ov"><div class="modal"><h3 id="mt"></h3><div class="pad" id="mb"></div>
  <div class="modal-foot"><button class="btn" onclick="document.getElementById('ov').classList.remove('open')">Fechar</button></div></div></div>

<script>
"use strict";
const $=id=>document.getElementById(id);
const SECCOLOR={comercial:'#D4AF37',juridico:'#B98AE6',financeiro:'#56B97D',producao:'#46B7C9',suporte:'#E0A845',diretoria:'#9AA1B0'};
const KIND={trigger:{c:'#56B97D',ic:'⛳',t:'trigger'},action:{c:'#A7ADBF',ic:'🔹',t:'ação'},decision:{c:'#E0A845',ic:'🔀',t:'decisão'},automation:{c:'#D4AF37',ic:'⚡',t:'auto'}};
const TITLE={comercial:'Comercial',juridico:'Jurídico',financeiro:'Financeiro',producao:'Produção',suporte:'Suporte',diretoria:'Diretoria'};

const SPECS={
comercial:[
 ['new','Lead recebido','Prospect.status=new','trigger','Lead entra no funil',['qualifying']],
 ['qualifying','Em qualificação','status=qualifying','action','SDR qualifica',['qualified']],
 ['qualified','Qualificado','status=qualified','action','Lead validado',['meeting_invite']],
 ['meeting_invite','Convite para Reunião','status=meeting_invite','action','Envia convite',['scheduled']],
 ['scheduled','Agendado','status=scheduled','action','Reunião marcada',['pre_meeting']],
 ['pre_meeting','Pré-Reunião','status=pre_meeting','action','Preparação',['meeting_1_done']],
 ['meeting_1_done','Reunião 1 realizada','status=meeting_1_done','action','Descoberta',['tech_analysis']],
 ['tech_analysis','Análise técnica e proposta','status=tech_analysis','action','Dev define escopo/prazo/valor + tipo',['meeting_2_done']],
 ['meeting_2_done','Reunião 2 realizada','status=meeting_2_done','action','Apresenta proposta',['proposal']],
 ['proposal','Proposta enviada','status=proposal · Proposal','decision','Aceita ou não fecha',['won']],
 ['won','Projeto Fechado','status=won','action','Dispara abertura + ClientOnboarding',['data_collection']],
 ['data_collection','Coleta de dados','ClientOnboarding.status=submitted','automation','Dispara Jurídico + Financeiro em paralelo',[]],
],
juridico:[
 ['contrato_entrada','Entrada contrato (Coleta)','LegalCase(contrato).source=comercial','trigger','Cria caso de contrato',['contrato_preparacao']],
 ['contrato_preparacao','Contrato · Preparação','status=preparacao','action','Elabora contrato',['contrato_envio']],
 ['contrato_envio','Contrato · Envio (Autentique)','status=envio_assinatura','action','Sobe no Autentique',['contrato_aguardando']],
 ['contrato_aguardando','Contrato · Aguardando','status=aguardando_assinatura','action','Aguarda assinatura',['contrato_assinado']],
 ['contrato_assinado','Contrato · Assinado','status=assinado','decision','Formalizado',['contrato_libera_financeiro']],
 ['contrato_libera_financeiro','Disparo: libera cobrança','LegalCase(contrato).assinado','automation','Ativa cobrança no Financeiro',[]],
 ['validacao_entrada','Entrada validação (Etapa 6)','LegalCase(validacao_documento).source=producao','trigger','Cria caso de validação',['validacao_preparacao']],
 ['validacao_preparacao','Validação · Anexar + Autentique','status=preparacao','action','Anexa e sobe',['validacao_envio']],
 ['validacao_envio','Validação · Envio','status=envio_assinatura','action','Envia ao cliente',['validacao_aguardando']],
 ['validacao_aguardando','Validação · Aguardando','status=aguardando_assinatura','action','Aguarda',['validacao_assinado']],
 ['validacao_assinado','Validação · Assinado','status=assinado','decision','Baseline',['validacao_libera_producao']],
 ['validacao_libera_producao','Disparo: libera Etapa 7','LegalCase(validacao).assinado','automation','Libera Desenvolvimento',[]],
 ['aditivo_entrada','Entrada aditivo (mudança)','LegalCase(aditivo).source=producao','trigger','Mudança de escopo',['aditivo_preparacao']],
 ['aditivo_preparacao','Aditivo · Preparação','status=preparacao','action','Elabora aditivo',['aditivo_envio']],
 ['aditivo_envio','Aditivo · Envio (Autentique)','status=envio_assinatura','action','Sobe e envia',['aditivo_aguardando']],
 ['aditivo_aguardando','Aditivo · Aguardando','status=aguardando_assinatura','action','Aguarda',['aditivo_assinado']],
 ['aditivo_assinado','Aditivo · Assinado','status=assinado','decision','Formalizado',['aditivo_libera_producao','aditivo_libera_financeiro']],
 ['aditivo_libera_producao','Disparo: nova fase','LegalCase(aditivo).assinado','automation','Abre nova fase',[]],
 ['aditivo_libera_financeiro','Disparo: ajuste de valor','LegalCase(aditivo).assinado','automation','Ajusta cobrança',[]],
 ['encerramento_entrada','Entrada encerramento','LegalCase(encerramento).source=cliente','trigger','Cliente solicita',['encerramento_preparacao']],
 ['encerramento_preparacao','Encerramento · Distrato','status=preparacao','action','Analisa e elabora distrato',['encerramento_envio']],
 ['encerramento_envio','Encerramento · Envio','status=envio_assinatura','action','Sobe e envia',['encerramento_aguardando']],
 ['encerramento_aguardando','Encerramento · Aguardando','status=aguardando_assinatura','action','Aguarda',['encerramento_assinado']],
 ['encerramento_assinado','Encerramento · Assinado','status=assinado','decision','Distrato formalizado',['encerramento_libera_financeiro']],
 ['encerramento_libera_financeiro','Disparo: acerto final','LegalCase(encerramento).assinado','automation','Acerto final no Financeiro',[]],
],
financeiro:[
 ['pre_cadastro_invoice','Pré-cadastra fatura pendente','Invoice.status=pending','trigger','Em paralelo com o Jurídico',['aguarda_contrato_assinado']],
 ['aguarda_contrato_assinado','Aguarda contrato assinado','LegalCase(contrato).assinado','decision','Espera o gatilho do Jurídico',['cobranca_ativa']],
 ['cobranca_ativa','Libera cobrança ativa','Invoice enviável','action','Só após assinatura (regra de ouro)',['regua_cobranca','entrada_paga']],
 ['regua_cobranca','Régua de cobrança','check_invoice_overdue','automation','Dunning (entra agora)',['entrada_paga']],
 ['entrada_paga','Entrada paga','Invoice.status=paid','automation','Libera a Produção (Dia 0)',[]],
 ['contas_a_pagar','Contas a pagar','RecurringExpense, TaxEntry','action','Informativo',[]],
 ['faturamento_fiscal','Faturamento e fiscal','Invoice NFS-e, TaxConfig','action','Informativo',[]],
 ['cobranca_inadimplencia','Cobrança e inadimplência','Invoice(overdue)','action','Informativo',[]],
 ['fluxo_de_caixa','Fluxo de caixa e gestão','Transaction, DRE, MRR','action','Informativo · MRR fase posterior',[]],
],
producao:[
 ['etapa_3_preparacao','E3 · Preparação','Project.etapa_atual=etapa_3','trigger','Entra com entrada paga; não conta no prazo',['etapa_4_onboarding']],
 ['etapa_4_onboarding','E4 · Onboarding (Dia 0)','etapa_4 · OnboardingMappingForm','action','Seta dia_zero e dispara o Motor',['etapa_5_documentacao']],
 ['etapa_5_documentacao','E5 · Documentação','etapa_5 · ProjectDocument','action','12 seções viram baseline',['etapa_6_validacao_doc']],
 ['etapa_6_validacao_doc','E6 · Validação da doc','etapa_6','action','Segue p/ assinatura no Jurídico',['etapa_7_desenvolvimento']],
 ['etapa_7_desenvolvimento','E7 · Desenvolvimento','etapa_7','action','Só com doc assinada; paralelo ao WeeklyUpdate',['etapa_8_auditoria']],
 ['etapa_8_auditoria','E8 · Auditoria interna','etapa_8 · ProjectAudit','action','Aprovada destrava a Etapa 9',['etapa_9_apresentacao']],
 ['etapa_9_apresentacao','E9 · Apresentação','etapa_9 · DeliveryApproval','action','Link admin único',['homologacao']],
 ['homologacao','Homologação','homologacao · ReUpdateCycle','action','Janela de teste + re-update',['registro_entrega']],
 ['registro_entrega','Registro da versão','ProjectEnvironment','action','Cliente aprovou',['bifurcacao_tipo']],
 ['bifurcacao_tipo','Bifurcação por tipo','Project.tipo','decision','Fechado→graduação · Recorrente→implementação',['etapa_10_graduacao','implementacao']],
 ['etapa_10_graduacao','E10 · Graduação','etapa_10_graduacao','action','Cria RecurrenceContract(suporte_basico)',['recorrencia']],
 ['implementacao','Implementação','implementacao','action','Cria RecurrenceContract(operacao_continua)',['recorrencia']],
 ['recorrencia','Recorrência','recorrencia · RecurrenceContract','automation','Todo entregue entra em recorrência + Suporte',[]],
],
suporte:[
 ['chamado_aberto','Chamado aberto','SupportTicket.status=aberto','trigger','Canal único, token assinado',['triagem']],
 ['triagem','Triagem','status=triagem','decision','bug→análise · dúvida→resolve · mudança→update',['analise','resolve_direto','pedido_update']],
 ['resolve_direto','Resolve direto','status=resolvido','action','Dúvida respondida na hora',['fechado']],
 ['pedido_update','Pedido de update','PedidoUpdate.status=opened','automation','Mudança vira Prospect (tech_analysis)',['resolvido']],
 ['analise','Análise','status=analise · conclusao','decision','garantia/orçamento/recorrente/inconclusivo',['correcao','escala_diretoria']],
 ['correcao','Correção / Orçamento','status=correcao','action','Garantia, recorrente ou orçamento',['resolvido']],
 ['escala_diretoria','Escala Diretoria','conclusao=inconclusivo','automation','Cria DirectorEscalation',['resolvido']],
 ['resolvido','Resolvido','status=resolvido','action','Aguarda retorno do cliente',['fechado']],
 ['fechado','Fechado','status=fechado','action','Auto-fecha após 5 dias',[]],
],
diretoria:[
 ['escalacao_recebida','Escalação recebida','DirectorEscalation','trigger','Do Suporte (inconclusivo)',['analise_resumo']],
 ['analise_resumo','Análise (resumo + evidência)','DirectorEscalation','action','Recebe o caso',['decisao']],
 ['decisao','Decisão','decision','decision','absorver/cobrar/negociar',['devolve_decisao']],
 ['devolve_decisao','Devolve decisão ao fluxo','DirectorEscalation.resolved','automation','Atualiza o ticket',[]],
 ['reuniao_semanal','Reunião semanal de Diretoria','DirectoryMeeting','automation','Cadência semanal · agrega KPIs',[]],
],
};
const CROSS=[
 ['comercial','data_collection','juridico','contrato_entrada','Coleta → contrato'],
 ['comercial','data_collection','financeiro','pre_cadastro_invoice','Coleta → pré-cadastro'],
 ['juridico','contrato_libera_financeiro','financeiro','aguarda_contrato_assinado','Assinado → cobrança'],
 ['financeiro','entrada_paga','producao','etapa_3_preparacao','Pago → Produção (Dia 0)'],
 ['producao','etapa_6_validacao_doc','juridico','validacao_entrada','E6 → doc Jurídico'],
 ['juridico','validacao_libera_producao','producao','etapa_7_desenvolvimento','Doc assinada → E7'],
 ['juridico','aditivo_libera_producao','producao','etapa_7_desenvolvimento','Aditivo → nova fase'],
 ['juridico','aditivo_libera_financeiro','financeiro','cobranca_inadimplencia','Aditivo → valor'],
 ['juridico','encerramento_libera_financeiro','financeiro','cobranca_inadimplencia','Encerramento → acerto'],
 ['producao','etapa_10_graduacao','suporte','chamado_aberto','Graduação → Suporte'],
 ['producao','implementacao','suporte','chamado_aberto','Implementação → Suporte'],
 ['suporte','pedido_update','comercial','tech_analysis','Mudança → Comercial'],
 ['suporte','escala_diretoria','diretoria','escalacao_recebida','Inconclusivo → Diretoria'],
 ['diretoria','devolve_decisao','suporte','analise','Decisão → ticket'],
];
const ORDER=['comercial','juridico','financeiro','producao','suporte','diretoria'];

/* layout */
const NW=216,NH=76,COL=300,ROWH=158,LANEPAD=58,LANE_GAP=58,LX=40;
const pos={}, lanes=[]; let worldW=0, worldH=0;
(function layout(){
  let y=20;
  for(const sec of ORDER){
    const arr=SPECS[sec]; let row=-1,col=0,maxCol=0,maxRow=0;
    const local={};
    arr.forEach(n=>{ if(n[3]==='trigger'){row++;col=0;}else{col++;} local[n[0]]={row,col}; maxCol=Math.max(maxCol,col);maxRow=Math.max(maxRow,row); });
    const laneH=LANEPAD+maxRow*ROWH+NH+30;
    arr.forEach(n=>{ const l=local[n[0]]; pos[sec+':'+n[0]]={x:LX+160+l.col*COL, y:y+LANEPAD+l.row*ROWH, sec, n}; });
    const laneW=160+(maxCol+1)*COL+40;
    lanes.push({sec,x:LX,y,w:laneW,h:laneH,color:SECCOLOR[sec]});
    worldW=Math.max(worldW,LX+laneW); worldH=y+laneH; y+=laneH+LANE_GAP;
  }
  worldW+=60; worldH+=40;
})();

/* render */
const world=$('world'),lanesEl=$('lanes'),edgesSvg=$('edges'),nodesEl=$('nodes');
world.style.width=worldW+'px';world.style.height=worldH+'px';
edgesSvg.setAttribute('width',worldW);edgesSvg.setAttribute('height',worldH);
lanesEl.innerHTML=lanes.map(L=>`<div class="lane" style="left:${L.x}px;top:${L.y}px;width:${L.w}px;height:${L.h}px;background:${hex(L.color,.05)}"><div class="lane-lbl" style="color:${L.color}">${TITLE[L.sec]}</div></div>`).join('');
const TRACK={contrato_entrada:'Contrato',validacao_entrada:'Validação do documento',aditivo_entrada:'Aditivo',encerramento_entrada:'Encerramento'};
let nodesHTML='';
for(const sec of ORDER)for(const n of SPECS[sec]){
  const p=pos[sec+':'+n[0]],k=KIND[n[3]];
  if(TRACK[n[0]]) nodesHTML+=`<div class="tracklbl" style="left:${p.x}px;top:${p.y-26}px;color:${hex(SECCOLOR[sec],.6)}">${TRACK[n[0]]}</div>`;
  nodesHTML+=`<div class="node" data-id="${sec}:${n[0]}" style="left:${p.x}px;top:${p.y}px">
    <span class="acc" style="background:${k.c}"></span>
    <div class="nhd"><span class="ndot" style="background:${k.c}"></span><span class="ttl">${n[1]}</span></div>
    <div class="nent">${n[2]}</div>
    <span class="nkind" style="color:${k.c}">${k.t}</span></div>`;
}
nodesEl.innerHTML=nodesHTML;

function port(id,side){const p=pos[id];return {x:p.x+(side==='out'?NW:0),y:p.y+NH/2};}
function epath(a,b){const dx=Math.min(180,Math.max(50,Math.abs(b.x-a.x)*0.45));return `M ${a.x} ${a.y} C ${a.x+dx} ${a.y}, ${b.x-dx} ${b.y}, ${b.x} ${b.y}`;}
let edgeHTML=`<defs>
  <marker id="ar" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="rgba(201,210,225,.55)"/></marker>
  <marker id="arg" markerWidth="9" markerHeight="9" refX="7.5" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="rgba(240,208,96,.92)"/></marker>
</defs>`;
// fluxo interno
for(const sec of ORDER)for(const n of SPECS[sec])for(const nx of n[5]){
  const a=port(sec+':'+n[0],'out'),b=port(sec+':'+nx,'in');
  edgeHTML+=`<path class="edge" marker-end="url(#ar)" d="${epath(a,b)}"/>`;
}
// automações entre setores (com chip de rótulo)
for(const c of CROSS){
  const a=port(c[0]+':'+c[1],'out'),b=port(c[2]+':'+c[3],'in');
  edgeHTML+=`<path class="edge cross" marker-end="url(#arg)" d="${epath(a,b)}"/>`;
}
for(const c of CROSS){
  const a=port(c[0]+':'+c[1],'out'),b=port(c[2]+':'+c[3],'in');
  const mx=(a.x+b.x)/2,my=(a.y+b.y)/2, tw=c[4].length*5.6+16;
  edgeHTML+=`<g class="chip"><rect x="${mx-tw/2}" y="${my-19}" width="${tw}" height="16" rx="8" fill="rgba(18,18,26,.94)" stroke="rgba(240,208,96,.45)"/><text class="elabel" x="${mx}" y="${my-7}" text-anchor="middle">${c[4]}</text></g>`;
}
edgesSvg.innerHTML=edgeHTML;

function hex(c,a){const n=parseInt(c.slice(1),16);return `rgba(${n>>16&255},${n>>8&255},${n&255},${a})`;}

/* detalhe */
nodesEl.addEventListener('click',e=>{
  const el=e.target.closest('.node');if(!el)return;
  const [sec,key]=el.dataset.id.split(':');const n=SPECS[sec].find(x=>x[0]===key);const k=KIND[n[3]];
  const crossOut=CROSS.filter(c=>c[0]===sec&&c[1]===key);
  $('mt').innerHTML=`<span style="width:9px;height:9px;border-radius:50%;background:${SECCOLOR[sec]};display:inline-block"></span> ${TITLE[sec]} · ${n[1]}`;
  $('mb').innerHTML=`<div class="k">Tipo</div>${k.ic} ${k.t}
    <div class="k">Entidade no ERP</div><code>${n[2]}</code>
    <div class="k">O que acontece</div>${n[4]}`+
    (crossOut.length?`<div class="auto">⚡ Automação: ${crossOut.map(c=>c[4]).join(' · ')}</div>`:'');
  $('ov').classList.add('open');
});
$('ov').addEventListener('mousedown',e=>{if(e.target===$('ov'))$('ov').classList.remove('open');});

/* pan / zoom */
const stage=$('stage');let view={x:60,y:20,s:.7},pan=null;
function apply(){world.style.transform=`translate(${view.x}px,${view.y}px) scale(${view.s})`;$('zl').textContent=Math.round(view.s*100)+'%';}
stage.addEventListener('mousedown',e=>{ if(e.target.closest('.node'))return;
  pan={sx:e.clientX,sy:e.clientY,ox:view.x,oy:view.y};stage.classList.add('grab');
  document.addEventListener('mousemove',onPan);document.addEventListener('mouseup',endPan);});
function onPan(e){view.x=pan.ox+(e.clientX-pan.sx);view.y=pan.oy+(e.clientY-pan.sy);apply();}
function endPan(){document.removeEventListener('mousemove',onPan);document.removeEventListener('mouseup',endPan);stage.classList.remove('grab');}
stage.addEventListener('wheel',e=>{e.preventDefault();const r=stage.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top,o=view.s;
  let s=o*(e.deltaY<0?1.1:1/1.1);s=Math.min(2,Math.max(.18,s));
  view.x=mx-((mx-view.x)/o)*s;view.y=my-((my-view.y)/o)*s;view.s=s;apply();},{passive:false});
function fit(){const r=stage.getBoundingClientRect(),p=60,s=Math.min(1.1,Math.min((r.width-p*2)/worldW,(r.height-p*2)/worldH));
  view={x:p,y:p,s:Math.max(.18,s)};apply();}
$('zi').onclick=()=>{view.s=Math.min(2,view.s*1.15);apply();};
$('zo').onclick=()=>{view.s=Math.max(.18,view.s/1.15);apply();};
$('fit').onclick=fit;
fit();
</script>
</body>
</html>
